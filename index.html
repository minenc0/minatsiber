<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine NCO - Laporan Test Peminatan</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }
        
        .header {
            background: #0078d4;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #0078d4;
        }
        
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 30px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .loading i {
            font-size: 40px;
            color: #0078d4;
            animation: spin 1s linear infinite;
            display: block;
            margin-bottom: 15px;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .error-box {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin: 20px 0;
        }
        
        .btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            float: right;
        }
        
        .btn:hover { background: #218838; }
        
        .dataTables_wrapper {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        table.dataTable {
            border-collapse: collapse;
            width: 100% !important;
        }
        
        table.dataTable thead th {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            font-weight: 600;
            color: #333;
            padding: 14px;
            text-align: left;
        }
        
        table.dataTable tbody td {
            padding: 12px 14px;
            border-bottom: 1px solid #eee;
        }
        
        .last-update {
            color: #666;
            font-size: 13px;
            margin-top: 15px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"></div>
        <h1>created by me</h1>
    </div>
    
    <div class="container">
        <h2 class="title">Laporan Test Peminatan Taruna Sub Siber Prodi Nikelektrohan Th. 2025</h2>
        
        <button class="btn" onclick="loadData()">🔄 Refresh Data</button>
        
        <div id="loading" class="loading">
            <i>⏳</i>
            <p>Memuat data dari spreadsheet...</p>
        </div>
        
        <div id="error" class="error-box" style="display:none;">
            <h3>Error Memuat Data</h3>
            <p id="errorMessage"></p>
            <button class="btn" onclick="loadData()" style="float:none;margin-top:10px;">Coba Lagi</button>
        </div>
        
        <div id="tableContainer" style="display:none;">
            <table id="reportTable" class="display" style="width:100%">
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>Pangkat</th>
                        <th>No AK</th>
                        <th>Nilai</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="last-update" id="lastUpdate"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script>
        // URL Published Spreadsheet (CSV format - lebih reliable)
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkACgwr_vGXy-nz4ZjpME8FxVh8Pld8wg4bOMdyIobI8R79k1vns3rSZC-4j93ZC1-BT0MwvgFg2ra/pub?gid=0&single=true&output=csv';
        
        // Fallback: URL Published HTML (untuk parsing manual jika CSV gagal)
        const SHEET_HTML_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkACgwr_vGXy-nz4ZjpME8FxVh8Pld8wg4bOMdyIobI8R79k1vns3rSZC-4j93ZC1-BT0MwvgFg2ra/pubhtml?gid=0&single=true';
        
        let dataTable = null;

        function loadData() {
            $('#loading').show();
            $('#error').hide();
            $('#tableContainer').hide();
            
            if (dataTable) {
                dataTable.destroy();
                $('#tableBody').empty();
            }
            
            // Coba ambil CSV dulu (lebih mudah diparse)
            fetchCSV();
        }

        function fetchCSV() {
            console.log('Fetching CSV...');
            
            // Gunakan CORS proxy gratis
            const proxyUrl = 'https://api.allorigins.win/raw?url=';
            const targetUrl = encodeURIComponent(SHEET_CSV_URL + '&_=' + Date.now());
            
            fetch(proxyUrl + targetUrl)
                .then(response => {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.text();
                })
                .then(csvText => {
                    console.log('CSV received, length:', csvText.length);
                    const data = parseCSV(csvText);
                    processData(data);
                })
                .catch(error => {
                    console.log('CSV failed, trying direct fetch:', error);
                    // Coba fetch langsung tanpa proxy
                    return fetch(SHEET_CSV_URL + '&_=' + Date.now())
                        .then(r => r.text())
                        .then(text => {
                            const data = parseCSV(text);
                            processData(data);
                        })
                        .catch(err => {
                            console.error('Both methods failed:', err);
                            showError('Gagal mengambil data. Error: ' + err.message);
                        });
                });
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const result = [];
            
            // Skip header (baris pertama)
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                // Parse CSV dengan handling quotes
                const cols = parseCSVLine(line);
                
                // Sesuaikan index kolom dengan struktur spreadsheet
                // Timestamp(0), Nama(1), No AK(2), Pangkat(3), Jawaban5(4), Nilai1(5), Nilai2(6), Nilai3(7), Nilai4(8), Nilai5(9), Nilai Total(10)
                const nama = cols[1];
                const no_ak = cols[2];
                const pangkat = cols[3];
                const nilai_total = cols[14];
                
                if (nama && nama.trim() !== '' && nama !== 'Nama') {
                    result.push({
                        nama: nama.trim(),
                        pangkat: (pangkat || '').trim(),
                        no_ak: (no_ak || '').trim(),
                        nilai: parseFloat(nilai_total) || 0
                    });
                }
            }
            
            return result;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function processData(data) {
            $('#loading').hide();
            
            if (data.length === 0) {
                showError('Tidak ada data ditemukan di spreadsheet');
                return;
            }
            
            console.log('Processing', data.length, 'rows');
            
            // Isi tabel
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${escapeHtml(row.nama)}</td>
                    <td>${escapeHtml(row.pangkat)}</td>
                    <td>${escapeHtml(row.no_ak)}</td>
                    <td style="font-weight:600;color:${getNilaiColor(row.nilai)}">${row.nilai}</td>
                `;
                tbody.appendChild(tr);
            });
            
            // Tampilkan tabel
            $('#tableContainer').show();
            
            // Init DataTable
            dataTable = $('#reportTable').DataTable({
                pageLength: 10,
                lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, "Semua"]],
                order: [[3, 'desc']],
                language: {
                    search: "Cari:",
                    lengthMenu: "Tampilkan _MENU_ data",
                    info: "Menampilkan _START_ sampai _END_ dari _TOTAL_ data",
                    infoEmpty: "Tidak ada data",
                    paginate: {
                        first: "Pertama",
                        last: "Terakhir",
                        next: "Selanjutnya",
                        previous: "Sebelumnya"
                    }
                }
            });
            
            // Update timestamp
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                'Terakhir diupdate: ' + now.toLocaleString('id-ID');
        }

        function showError(msg) {
            $('#loading').hide();
            $('#error').show();
            document.getElementById('errorMessage').textContent = msg;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getNilaiColor(nilai) {
            if (nilai >= 80) return '#28a745';
            if (nilai >= 60) return '#ffc107';
            if (nilai >= 40) return '#fd7e14';
            return '#dc3545';
        }

        // Load saat ready
        $(document).ready(function() {
            loadData();
        });
    </script>
</body>
</html>
